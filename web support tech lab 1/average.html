<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculate Average</title>
</head>
<body>
    <script>
        const avg=(a,b,c)=>{
            return (a+b+c)/3;
        }

        a=10;
        b=20;
        c=30;
        result=avg(a,b,c);
        console.log("average of "+a+" "+b+" "+c+"is :"+result)
    </script>
</body>
</html>

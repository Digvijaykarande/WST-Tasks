<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>find square</title>
</head>
<body>
    <script>
        const square=(num)=>{
            sqr=num*num;
            return sqr;
        }

        num=2;
        result=square(num);
        console.log("square of "+num+":"+result)
    </script>
</body>
</html>

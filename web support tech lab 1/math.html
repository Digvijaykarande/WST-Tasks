<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Calculator with js</h1>
    <input type="text" id="num1" placeholder="Enter first number">
    <input type="text" id="num2" placeholder="Enter second number"> 
    <button id="add">Add</button>
    <button id="subtract">Subtract</button>
    <button id="multiply">Multiply</button>
    <button id="divide">Divide</button>
    <p id="result"></p>
    <script>
        const num1 = document.getElementById('num1');
        const num2 = document.getElementById('num2');
        const addButton = document.getElementById('add');
        const subtractButton = document.getElementById('subtract');
        const multiplyButton = document.getElementById('multiply');
        const divideButton = document.getElementById('divide');
        const result = document.getElementById('result');

        addButton.addEventListener('click', function() {
            const sum = (num1.value) + (num2.value);
            result.textContent = 'Result: ' + sum;
        });
        subtractButton.addEventListener('click', function() {
            const difference = (num1.value) - (num2.value);
            result.textContent = 'Result: ' + difference;
        });
        multiplyButton.addEventListener('click', function() {
            const product = (num1.value) * (num2.value);
            result.textContent = 'Result: ' + product;
        });
        
        divideButton.addEventListener('click', function() {
            if ((num2.value) !== 0) {
                const quotient = (num1.value) / (num2.value);
                result.textContent = 'Result: ' + quotient;
            } 
        });
    </script>
    
</body>
</html>

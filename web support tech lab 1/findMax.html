<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>findMax</title>
</head>
<body>
    <script>
        function findMax(a,b){
            if(a>b){
                return a+" is larger";
            }

            else if(b>a){
                return b+" is larger"
            }
            else{
                return "both are equal"
            }
        }

        a=10;
        b=20;
        result=findMax(a,b);
        console.log(result);
    </script>
</body>
</html>

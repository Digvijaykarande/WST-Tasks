<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>is even</title>
</head>
<body>
    <script>
        const isEven=(num)=>{
            if(num%2==0){
                return true
            }
            else{
                return false
            }
        }
        num=30
        result=isEven(num);
        console.log("The Number is :"+result)
    </script>
</body>
